site_name: RepX
site_description: PyTorch-native tools for neural representation analysis

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top

nav:
  - Home: index.md
  - Contributing: CONTRIBUTING.md
  - License: LICENSE.md
  - Reference:
      - Alignment:
          - Overview: api/alignment.md
          - RSA: api/alignment-rsa.md
          - CKA: api/alignment-cka.md
      - Transfer:
          - Overview: api/transfer.md
          - LinearProbeEvaluator: api/transfer-linear-probe.md
          - NCCCEvaluator: api/transfer-nccc.md
      - Collapse:
          - Overview: api/collapse.md
          - compute_cdnv: api/collapse-cdnv.md
          - compute_directional_cdnv: api/collapse-directional-cdnv.md
          - compute_etf_deviation: api/collapse-etf-deviation.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_source: false
            heading_level: 2
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true